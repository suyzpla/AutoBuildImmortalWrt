name: build-x86-64-immortalwrt-24.10.x-baremetal

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择luci版本 (建议保持默认最新)"
        required: false
        default: "24.10.5"
        type: choice
        options:
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
      custom_router_ip:
        description: "路由器管理地址 (已避开光猫网段)"
        required: true
        default: "10.10.10.1"
      profile:
        description: '固件根分区大小 (MB) - 物理机推荐1024或更大'
        required: true
        default: '1024'
      enable_store:
        description: "集成 store 商店 (纯净版选 false)"
        required: false
        type: boolean
        default: false
      include_docker:
        description: "是否编译 Docker 插件 (纯净版选 no)"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置PPPoE拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
        - 'yes'
        - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build24.sh

      - name: Save Custom Router IP into OpenWrt files
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"
          echo "✅ 后台地址已设为: ${{ inputs.custom_router_ip }}"
      
      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]]; then
              echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
              exit 1
            fi
          fi
      
      - name: Inject Physical Drivers & daed Dependencies (裸机满血补丁)
        run: |
          # 1. 物理机网卡驱动与硬件加速支持 (针对 J4125 双网卡常见的 i225/i226/i210/Realtek)
          echo "CONFIG_PACKAGE_kmod-igc=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-igb=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-r8169=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-crypto-aesni=y" >> ${{ github.workspace }}/x86-64/imm.config
          
          # 2. daed 的核心 eBPF 运行依赖与网络隧道模块
          echo "CONFIG_PACKAGE_kmod-bpf=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-ebpf=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-tun=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-macvlan=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_bpftool=y" >> ${{ github.workspace }}/x86-64/imm.config
          
          # 3. 剥离冗余插件，注入基础工具与主题
          # 使用减号 (-) 显式剔除默认可能集成的代理插件，确保内核钩子纯净
          echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-theme-argon luci-app-argon-config luci-app-ttyd -luci-app-openclash -luci-app-passwall -luci-app-ssr-plus"' >> ${{ github.workspace }}/shell/custom-packages.sh
          echo "✅ 物理网卡驱动、AES-NI、eBPF 依赖已注入，冲突插件已清理"

      - name: Enable Store integration
        run: |
          if [ "${{ inputs.enable_store }}" == "true" ]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> shell/custom-packages.sh
            echo "✅ 已追加 luci-app-store"
          else
            echo "❎ 未启用 luci-app-store"
          fi

      - name: Build ImmortalWrt-x86-64-efi 24.10.x
        run: |
          profile="${{ inputs.profile }}"
          include_docker="${{ inputs.include_docker }}"
          luci_version="${{ inputs.luci_version }}"
          echo "Building for profile: $profile"
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/x86-64/imm.config:/home/build/immortalwrt/.config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build24.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE=$profile \
            -e INCLUDE_DOCKER=$include_docker \
            -e ENABLE_PPPOE=${{ inputs.enable_pppoe }} \
            -e PPPOE_ACCOUNT=${{ inputs.pppoe_account }} \
            -e PPPOE_PASSWORD=${{ inputs.pppoe_password }} \
            immortalwrt/imagebuilder:x86-64-openwrt-${luci_version} /bin/bash /home/build/immortalwrt/build.sh
          
      - name: Create info
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 🚀 J4125 物理裸机 纯净满血版 (基于 24.10)
          
          - 🏠 **后台地址**: \`${{ inputs.custom_router_ip }}\`
          - 👤 **用户名**: root
          - 🔑 **密码**: 无
          - 📦 **系统状态**: 包含物理网卡驱动 (igc/igb)、AES-NI 加密加速、daed 运行必备 eBPF 模块，已剔除 OpenClash/Passwall 冗余。
          EOF

          if [ "${{ inputs.include_docker }}" == "yes" ]; then
            echo -e "\n#### ⚠️ 已启用 Docker" >> ${{ github.workspace }}/router-info.md
          else
            echo -e "\n#### ✅ 纯净无 Docker 环境" >> ${{ github.workspace }}/router-info.md
          fi

      - name: Upload ImmortWrt as release assets
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: Autobuild-x86-64-24.10-BareMetal
          name: "J4125 物理机 纯净版固件 (Linux 6.6 内核)"
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
