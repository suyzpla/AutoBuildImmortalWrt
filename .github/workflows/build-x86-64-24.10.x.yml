name: build-x86-64-immortalwrt-24.10-pure-daed-v2

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "固件版本 (稳定版锁定 24.10.5)"
        required: false
        default: "24.10.5"
        type: choice
        options: [24.10.0, 24.10.1, 24.10.2, 24.10.3, 24.10.4, 24.10.5]
      custom_router_ip:
        description: "管理 IP"
        required: true
        default: "10.10.10.1"
      profile:
        description: "根分区大小 (MB) - 推荐 4096"
        required: true
        default: '4096'
      enable_pppoe:
        description: "是否开启自动拨号"
        required: true
        default: 'yes'
        type: choice
        options: ['yes', 'no']
      pppoe_account:
        description: "宽带账号"
        required: false
      pppoe_password:
        description: "宽带密码"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set Permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build24.sh

      - name: Prepare Config & Clean Bloat (深度清理)
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"

          # 1. 硬件驱动与密码学加速 (J4125 必备)
          echo "CONFIG_PACKAGE_kmod-igc=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-igb=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-r8169=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-crypto-aesni=y" >> ${{ github.workspace }}/x86-64/imm.config
          
          # 2. daed 1.24.0 全量依赖 (XDP 极速套接字)
          echo "CONFIG_PACKAGE_kmod-bpf=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-ebpf=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-tun=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-macvlan=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-xdp-sockets=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_bpftool=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_curl=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_ca-certificates=y" >> ${{ github.workspace }}/x86-64/imm.config

          # 3. 拦截器：通过脚本直接重写 ImageBuilder 配置
          # 这里我们在 custom-packages.sh 中注入一条强制执行的替换命令
          # 这样即便默认规则里有，也会在生成镜像前被剔除
          cat << 'EOF' > ${{ github.workspace }}/shell/custom-packages.sh
          # A. 将我们要加的包放进去
          CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-theme-argon luci-app-argon-config luci-app-ttyd daed luci-app-daed"
          
          # B. 暴力负向剔除：覆盖所有代理和 NAS 共享包
          CUSTOM_PACKAGES="$CUSTOM_PACKAGES -luci-app-passwall -luci-app-homeproxy -luci-app-openclash -luci-app-ssr-plus"
          CUSTOM_PACKAGES="$CUSTOM_PACKAGES -luci-app-samba4 -luci-app-samba -samba36-server -luci-app-ksmbd -ksmbd-server"
          CUSTOM_PACKAGES="$CUSTOM_PACKAGES -luci-app-vsftpd -luci-app-nfs-utils -luci-app-cifs-mount -automount -block-mount"
          CUSTOM_PACKAGES="$CUSTOM_PACKAGES -luci-app-unblockneteasemusic -luci-app-zerotier -luci-app-upnp -coreutils -mwan3"
          EOF

      - name: Build Firmware
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/x86-64/imm.config:/home/build/immortalwrt/.config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build24.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE=${{ inputs.profile }} \
            -e INCLUDE_DOCKER=no \
            -e ENABLE_PPPOE=${{ inputs.enable_pppoe }} \
            -e PPPOE_ACCOUNT=${{ inputs.pppoe_account }} \
            -e PPPOE_PASSWORD=${{ inputs.pppoe_password }} \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ inputs.luci_version }} /bin/bash -c "sed -i 's/luci-app-passwall//g; s/luci-app-homeproxy//g; s/luci-app-samba4//g' target/linux/x86/Makefile || true; /home/build/immortalwrt/build.sh"

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: Final-Pure-J4125-v2
          name: "J4125 物理机终极纯净版 v2 (完全阻断冗余包)"
          body: "已通过 Docker 级脚本拦截彻底删除了 PassWall、HomeProxy 及 Samba/NAS 共享组件。专注提供 eBPF (daed) 及 PPPoE 拨号环境。"
          files: ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
