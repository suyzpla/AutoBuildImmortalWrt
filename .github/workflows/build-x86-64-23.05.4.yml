name: build-x86-64-immortalwrt-23.05.4

on:
  workflow_dispatch:
    inputs:
      custom_router_ip:
        description: "路由器管理地址 (建议避开光猫网段)"
        required: true
        default: "10.10.10.1"
      profile:
        description: '固件根分区大小 (MB) - PVE环境建议1024'
        required: true
        default: '1024'
      enable_store:
        description: "集成 iStore 商店 (纯净版选 false)"
        required: false
        type: boolean
        default: false
      include_docker:
        description: "集成 Docker (纯净版选 no)"
        required: false
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否预配置 PPPoE?"
        required: true
        default: 'no'
        type: choice
        options:
        - 'yes'
        - 'no'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build23.sh
      
      - name: Save Custom Router IP
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"
          echo "✅ 后台地址已设为: ${{ inputs.custom_router_ip }}"

      - name: Inject VirtIO & AES-NI (PVE J4125 满血补丁)
        run: |
          # 强制将 PVE 防丢包驱动和 J4125 硬件加密写入配置文件
          echo "CONFIG_PACKAGE_kmod-virtio-net=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-virtio-blk=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-virtio-balloon=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "CONFIG_PACKAGE_kmod-crypto-aesni=y" >> ${{ github.workspace }}/x86-64/imm.config
          echo "✅ PVE 虚拟化及 AES 加密驱动已强制注入"

      - name: Enable Store integration
        run: |
          if [ "${{ inputs.enable_store }}" == "true" ]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> shell/custom-packages.sh
            echo "✅ 已开启 iStore"
          else
            echo "❎ 已禁用 iStore"
          fi

      - name: Build ImmortalWrt-x86-64-efi
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/x86-64/imm.config:/home/build/immortalwrt/.config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build23.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE=${{ inputs.profile }} \
            -e INCLUDE_DOCKER=${{ inputs.include_docker }} \
            -e ENABLE_PPPOE=${{ inputs.enable_pppoe }} \
            immortalwrt/imagebuilder:x86-64-openwrt-23.05.4 /bin/bash /home/build/immortalwrt/build.sh

      - name: Generate Release Info
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 🚀 J4125 PVE 满血定制版
          
          - 🏠 **后台地址**: \`${{ inputs.custom_router_ip }}\`
          - 👤 **用户名**: root
          - 🔑 **密码**: 无
          - 📦 **驱动状态**: 包含 VirtIO 防丢包模块 & AES-NI 加密加速
          - 🐳 **Docker状态**: 未集成
          EOF

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: J4125-PVE-Pure
          name: "J4125 PVE 纯净版固件 (0丢包优化)"
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
